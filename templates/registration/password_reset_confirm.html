{% extends "base_auth.html" %}
{% block title %}Set New Password | Hangarin{% endblock %}
{% block content %}
<h4>Set new password</h4>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary w-100" type="submit">Update password</button>
</form>

<script>
  document.querySelectorAll("input").forEach(el => el.classList.add("form-control"));
</script>
{% endblock %}
