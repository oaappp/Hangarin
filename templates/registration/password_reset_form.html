{% extends "base_auth.html" %}
{% block title %}Reset Password | Hangarin{% endblock %}
{% block content %}
<h4>Reset password</h4>
<p class="text-muted small">Enter your email to receive reset instructions.</p>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary w-100" type="submit">Send reset link</button>
</form>

<script>
  document.querySelectorAll("input").forEach(el => el.classList.add("form-control"));
</script>
{% endblock %}
