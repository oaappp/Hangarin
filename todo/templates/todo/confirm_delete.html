{% extends "base.html" %}
{% block title %}{{ title }} | Hangarin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block page_subtitle %}Please confirm your action{% endblock %}

{% block content %}
<div class="delete-card">
  <div class="delete-icon">!</div>
  <h3 class="mb-2">{{ title }}</h3>
  <p class="text-muted mb-4">{{ message }}</p>

  <form method="post" class="d-flex justify-content-center gap-2">
    {% csrf_token %}
    <button class="btn btn-danger px-4" type="submit">Delete</button>
    <a class="btn btn-light border px-4" href="{% url cancel_url %}">Cancel</a>
  </form>
</div>
{% endblock %}
