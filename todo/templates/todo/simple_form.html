{% extends "base.html" %}
{% block title %}{{ title }} | Hangarin{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block page_subtitle %}Fill in the details{% endblock %}

{% block content %}
<div class="table-card p-3" style="max-width: 720px;">
  <form method="post" class="row g-3">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-outline-secondary" href="{% url back_url %}">Cancel</a>
    </div>
  </form>
</div>

<script>
  document.querySelectorAll("input, select, textarea").forEach(el => {
    if (el.tagName === "SELECT") el.classList.add("form-select");
    else el.classList.add("form-control");
  });
</script>
{% endblock %}
