<div class="table-responsive">
  <table class="table custom-table align-middle">
    <thead>
      <tr>
        <th>Title</th>
        <th>Deadline</th>
        <th>Priority</th>
        <th>Category</th>
        <th class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for t in tasks %}
      <tr>
        <td class="fw-semibold">
          <a href="{% url 'todo:task_detail' t.pk %}" class="table-link">{{ t.title }}</a>
        </td>
        <td>{{ t.deadline }}</td>
        <td>{{ t.priority }}</td>
        <td>{{ t.category }}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-light border me-1" href="{% url 'todo:task_update' t.pk %}">Edit</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'todo:task_delete' t.pk %}">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="5" class="text-center text-muted py-4">No tasks found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
